<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

          <svg viewBox="0 0 24 24">

        <h1>Checkout Canceled</h1>
